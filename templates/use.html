<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container-fix">
        <div class="row">
            <!-- Results Section (Original Image) -->
            <div class="col-md-4" data-aos="fade-up" data-aos-delay="400">
                {% if prediction %}
                    <h3 style="color: aliceblue;"></h3>
                    <div class="text-center">
                        <h4 style="color: aliceblue;">Original Image</h4>
                        <img src="{{ url_for('static', filename='saved_images/' + file_name) }}" alt="Original Image"
                             class="img-fluid" style="max-height: 300px; width: 100%; object-fit: contain;" />
                    </div>
                {% endif %}
            </div>
    
            <!-- Results Section (Prediction Image) -->
            <div class="col-md-4" data-aos="fade-up" data-aos-delay="400">
                {% if prediction %}
                    <h3 style="color: aliceblue;"></h3>
                    <div class="text-center">
                        <h4 style="color: aliceblue;">Prediction Image</h4>
                        <img src="{{ url_for('static', filename='predicted_images/' + prediction_image) }}"
                             alt="Prediction result" class="img-fluid"
                             style="max-height: 300px; width: 100%; object-fit: contain;" />
                    </div>
                {% endif %}
            </div>
    
            <!-- Upload Section in the same row -->
            <div class="col-md-4" style="background-color: rgba(155, 143, 139, 0.514); border-radius: 25px; padding: 40px; margin-top: 50px;">
                <div class="text-center">
                    <h2 style="color: white; margin-bottom: 20px;">Upload Image</h2>
                    <form action="{{ url_for('prediction') }}" method="post" class="php-email-form" enctype="multipart/form-data">
                        <div class="mb-3">
                            <input type="file" class="form-control" name="file" required />
                        </div>
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
